<!DOCTYPE html>

<html>
<head>


<title>Login - ChatGPT Jr</title>

<style>

    body{
        margin:0;
        background:#0f172a;
        color:white;
        font-family:Arial,sans-serif;

        display:flex;
        justify-content:center;
        align-items:center;

        height:100vh;
    }

    .card{

        width:380px;

        background:#1e293b;

        padding:30px;

        border-radius:20px;

        box-shadow:
        0 0 25px rgba(59,130,246,.2);

    }

    h1{
        text-align:center;
        margin-bottom:10px;
    }

    p{
        text-align:center;
        color:#94a3b8;
    }

    input{
        width:100%;
        padding:12px;
        margin-top:10px;
        margin-bottom:15px;

        border:none;
        border-radius:10px;

        box-sizing:border-box;
    }

    button{
        width:100%;
        padding:12px;

        border:none;

        border-radius:10px;

        background:#2563eb;
        color:white;

        cursor:pointer;
    }

    .google-btn{
        display:block;
        width:100%;
        padding:12px;
        border-radius:10px;
        background:#2563eb;
        color:white;
        text-align:center;
        text-decoration:none;
        box-sizing:border-box;
    }

    .link{
        text-align:center;
        margin-top:15px;
    }

    a{
        color:#60a5fa;
    }

    hr{
        margin:20px 0;
        border:1px solid #334155;
    }

</style>


</head>

<body>

<div class="card">


<h1>⚡ ChatGPT Jr</h1>

<p>Welcome Back</p>

<form method="post">

    {% csrf_token %}

    {{ form.as_p }}

    <button type="submit">

        Login

    </button>

</form>

<hr>

<a
    href="/accounts/google/login/"
    class="google-btn">

    Continue with Google

</a>

<div class="link">

    Don't have an account?

    <a href="{% url 'register' %}">
        Register
    </a>

</div>


</div>

</body>
</html>
