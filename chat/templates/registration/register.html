<!DOCTYPE html>
<html>
<head>

    <title>Register - ChatGPT Jr</title>

    <style>

        body{
            margin:0;
            background:#0f172a;
            color:white;
            font-family:Arial,sans-serif;

            display:flex;
            justify-content:center;
            align-items:center;

            height:100vh;
        }

        .card{

            width:400px;

            background:#1e293b;

            padding:30px;

            border-radius:20px;

            box-shadow:
            0 0 25px rgba(59,130,246,.2);

        }

        h1{
            text-align:center;
        }

        p{
            text-align:center;
            color:#94a3b8;
        }

        input{
            width:100%;
            padding:12px;

            margin-top:10px;
            margin-bottom:15px;

            border:none;
            border-radius:10px;

            box-sizing:border-box;
        }

        button{

            width:100%;

            padding:12px;

            border:none;

            border-radius:10px;

            background:#2563eb;

            color:white;

            cursor:pointer;
        }

        .link{
            text-align:center;
            margin-top:15px;
        }

        a{
            color:#60a5fa;
        }

    </style>

</head>

<body>

<div class="card">

    <h1>⚡ ChatGPT Jr</h1>

    <p>Create Your Account</p>

    <form method="post">

        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">

            Register

        </button>

    </form>

    <div class="link">

        Already have an account?

        <a href="{% url 'login' %}">
            Login
        </a>

    </div>

</div>

</body>
</html>
