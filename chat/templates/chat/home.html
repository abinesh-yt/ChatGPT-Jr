<!DOCTYPE html>
<html>
<head>
    <title>ChatGPT Jr</title>

    <style>
        body{
            background:#0f172a;
            color:white;
            font-family:Arial;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .chat-box{
            width:700px;
            height:500px;
            background:#1e293b;
            border-radius:15px;
            padding:20px;
        }

        h1{
            text-align:center;
        }

        .messages{
            height:350px;
            border:1px solid #334155;
            padding:10px;
            border-radius:10px;
            overflow-y:auto;
        }

        .input-area{
            margin-top:15px;
            display:flex;
        }

        input{
            flex:1;
            padding:12px;
            border:none;
            border-radius:8px;
        }

        button{
            margin-left:10px;
            padding:12px 20px;
            border:none;
            border-radius:8px;
            cursor:pointer;
        }
    </style>

</head>

<body>

<div class="chat-box">

    <h1>🤖 ChatGPT Jr</h1>

    <div class="messages">
<p>Hello Abinesh 👋</p>
<p>I am ChatGPT Jr.</p>

{% if user_message %}
<p><strong>You:</strong> {{ user_message }}</p>
{% endif %}

{% if bot_response %}
<p><strong>AI:</strong> {{ bot_response }}</p>
{% endif %}
    </div>

    <form method="POST">
    {% csrf_token %}

    <div class="input-area">
        <input
            type="text"
            name="message"
            placeholder="Type your message..."
        >

        <button type="submit">
            Send
        </button>
    </div>
</form>

</div>

</body>
</html>
